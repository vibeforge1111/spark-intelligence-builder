[module]
name = "spark-intelligence-builder"
version = "0.1.0"
kind = "runtime"
plane = "runtime"
description = "Spark runtime core for identity, routing, memory, and provider orchestration"
homepage = "https://github.com/vibeforge1111/spark-intelligence-builder"
license = "AGPL-3.0-only"

[runtime]
kind = "python"
version = ">=3.11"
package_manager = "uv"
lockfile = "uv.lock"

[install.dev]
commands = ["python -m pip install -e ."]

[provides]
capabilities = [
  "spark.runtime",
  "spark.memory",
  "spark.identity",
  "spark.routing",
]
binary = "spark-intelligence"

[needs]
modules = []
capabilities = []
secrets = []

[claims]
secrets = []
ports = []
routes = []

[healthcheck]
command = "python -c \"import spark_intelligence.cli; print('Spark runtime core is importable.')\""
timeout_seconds = 20
success_hint = "Spark runtime core is installed and importable."
failure_hint = "Run `spark-intelligence doctor` for the deeper operator/security audit."

[entrypoints]
cli = "spark-intelligence"

[config]
format = "env+yaml"
installer_owned = true
primary = "$SPARK_HOME/config.yaml"

[paths]
home = "~/.spark/modules/spark-intelligence-builder"
state = "~/.spark/state/spark-intelligence"
logs = "~/.spark/logs/spark-intelligence"

[profiles.telegram_starter]
role = "runtime-behind-gateway"
owns = [
  "spark.runtime",
  "spark.memory",
  "spark.identity",
  "spark.routing",
]
does_not_own = [
  "telegram.ingress",
  "telegram.bot_token",
]
