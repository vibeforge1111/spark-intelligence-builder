name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test-and-audit:
    name: test-and-audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require Harness Core repo token
        env:
          SPARK_CI_REPO_TOKEN: ${{ secrets.SPARK_CI_REPO_TOKEN }}
        run: |
          if [ -z "$SPARK_CI_REPO_TOKEN" ]; then
            echo "::error::SPARK_CI_REPO_TOKEN is required to checkout private vibeforge1111/spark-harness-core for authority tests."
            exit 1
          fi

      - name: Checkout Harness Core
        uses: actions/checkout@v4
        with:
          repository: vibeforge1111/spark-harness-core
          ref: codex/genesis-harness-core-20260602
          path: spark-harness-core
          token: ${{ secrets.SPARK_CI_REPO_TOKEN }}

      - name: Configure private Git dependencies
        env:
          SPARK_CI_REPO_TOKEN: ${{ secrets.SPARK_CI_REPO_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${SPARK_CI_REPO_TOKEN}@github.com/vibeforge1111/".insteadOf "https://github.com/vibeforge1111/"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv pip-audit

      - name: Check lockfile
        run: uv lock --check

      - name: Install locked environment
        run: uv sync --locked

      - name: Run focused tests
        env:
          SPARK_HARNESS_CORE_SOURCE: ${{ github.workspace }}/spark-harness-core/src
        run: |
          uv run --with pytest python -m pytest \
            tests/test_secret_file_permissions.py \
            tests/test_gateway_discord_webhook.py \
            tests/test_builder_prelaunch_contracts.py \
            -q

      - name: Audit Python dependencies
        run: pip-audit --progress-spinner off .

  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
