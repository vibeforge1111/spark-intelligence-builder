name: Spark shared CI

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
      - "reconcile/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  conformance:
    uses: vibeforge1111/spark-cli/.github/workflows/reusable-conformance.yml@ap-01-reusable-ci-v1
    with:
      python-version: "3.11"
      install-command: "python -m pip install -e . pytest"
      test-command: "python -m pytest -q"
      conformance-command: "python -c \"import spark_intelligence.cli; print('Spark runtime core is importable.')\""

  scanners:
    uses: vibeforge1111/spark-cli/.github/workflows/reusable-scanners.yml@ap-01-reusable-ci-v1
